name: Project CI

on:
  push:
    branches: [main, refactor]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: "test_bot_token"
      ADMIN_IDS: "123456789"

      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_db

      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      REDIS_USERNAME: default
      REDIS_PASSWORD: default

      API_BASE_URL: http://localhost:8000

      SECRET_KEY: test_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE \"test_db_Test\";"

      - name: Run tests
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t project_image .